name: Lofi Generator CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate_lofi:
    runs-on: ubuntu-latest
    env:
      LOFI_API_URL: ${{ secrets.LOFI_API_URL }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: "npm"

    - name: Install Node.js dependencies
      run: |
        npm install

    - name: Generate session seed
      id: seed
      run: |
        echo "value=$(python3 -c 'import random; print(random.randint(1,999999))')" >> $GITHUB_OUTPUT

    - name: Check LOFI API
      id: lofi-check
      run: |
        echo "🔎 Checking LOFI API..."
        if [ -z "$LOFI_API_URL" ]; then
          echo "⚠️ LOFI_API_URL secret is empty"
          echo "skip_audio=true" >> $GITHUB_ENV
        elif curl -sSf "$LOFI_API_URL" >/dev/null; then
          echo "✅ LOFI API is reachable"
        else
          echo "⚠️ LOFI API not reachable, skipping audio generation"
          echo "skip_audio=true" >> $GITHUB_ENV
        fi

    - name: Generate 1-hour Lofi audio via API
      if: env.skip_audio != 'true'
      run: |
        echo "🎵 Generating audio with seed: ${{ steps.seed.outputs.value }}"
        python3 scripts/generate_audio.py \
          --seed "${{ steps.seed.outputs.value }}" \
          --duration 300 \
          --output /tmp/lofi_audio.wav \
          --api-url "$LOFI_API_URL" || \
        echo "⚠️ Audio generation failed, creating silent track"
        python3 -c "from pydub import AudioSegment; AudioSegment.silent(duration=300000).export('/tmp/lofi_audio.wav','wav')"

    - name: Generate Lofi animation
      run: |
        python3 scripts/generate_animation.py \
          --seed "${{ steps.seed.outputs.value }}" \
          --output /tmp/lofi_animation.mp4
