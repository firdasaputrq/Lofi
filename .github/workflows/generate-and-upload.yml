name: Lofi Auto Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOFI_API_URL: ${{ secrets.LOFI_API_URL }}

    steps:
    # Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    # Upgrade pip & install dependencies
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Setup Node.js for tonejs-renderer
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: "npm"
        cache-dependency-path: scripts/tonejs-renderer/package-lock.json
    
    - name: Install Node dependencies
      working-directory: scripts/tonejs-renderer
      run: npm install

    # Generate session seed
    - name: Generate session seed
      id: session_seed
      run: |
        echo "value=$(python3 -c 'import random; print(random.randint(1, 999999))')" >> $GITHUB_OUTPUT

    # Check LOFI API availability
    - name: Check LOFI API
      id: check_lofi_api
      run: |
        echo "🔎 Checking LOFI API..."
        if [ -z "$LOFI_API_URL" ]; then
          echo "⚠️ LOFI_API_URL secret is empty"
          echo "skip_audio=true" >> $GITHUB_ENV
        elif curl -sSf "$LOFI_API_URL" >/dev/null; then
          echo "✅ LOFI API is reachable"
        else
          echo "⚠️ LOFI API not reachable. Skipping audio generation"
          echo "skip_audio=true" >> $GITHUB_ENV
        fi

    # Generate 1-hour Lofi audio
    - name: Generate 1-hour Lofi audio
      if: env.skip_audio != 'true'
      run: |
        echo "🎵 Generating audio with seed: ${{ steps.session_seed.outputs.value }}"
        python3 scripts/generate_audio.py \
          --seed "${{ steps.session_seed.outputs.value }}" \
          --duration 300 \
          --output /tmp/lofi_audio.wav \
          --api-url "$LOFI_API_URL" || echo "⚠️ Audio generation failed, will create silent track"

    # Generate Lofi animation
    - name: Generate Lofi animation
      run: |
        echo "🎨 Generating Lofi animation..."
        python3 scripts/generate_animation.py \
          --seed "${{ steps.session_seed.outputs.value }}"
