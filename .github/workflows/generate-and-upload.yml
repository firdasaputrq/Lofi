name: Lofi CI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      LOFI_API_URL: ${{ secrets.LOFI_API_URL }}
      SEED: ${{ github.run_id }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # -------------------------
    # Setup Node.js + npm
    # -------------------------
    - name: Setup Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node.js dependencies
      working-directory: ./scripts/tonejs-renderer
      run: |
        npm ci

    # -------------------------
    # Setup Python 3.11
    # -------------------------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Python dependencies
      working-directory: ./scripts
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # -------------------------
    # Check LOFI API
    # -------------------------
    - name: Check LOFI API
      shell: bash
      run: |
        echo "🔎 Checking LOFI API..."
        if [ -z "$LOFI_API_URL" ]; then
          echo "⚠️ LOFI_API_URL secret is empty"
          echo "skip_audio=true" >> $GITHUB_ENV
        elif curl -sSf "$LOFI_API_URL" >/dev/null; then
          echo "✅ LOFI API is reachable"
        else
          echo "⚠️ LOFI API not reachable. Skipping audio generation"
          echo "skip_audio=true" >> $GITHUB_ENV
        fi

    # -------------------------
    # Generate audio 1 jam via headless browser
    # -------------------------
    - name: Generate 1-hour Lofi Audio
      if: env.skip_audio != 'true'
      shell: bash
      run: |
        echo "🎵 Generating 1-hour Lofi Audio with seed: $SEED"
        node ./scripts/tonejs-renderer/render_headless.js $SEED ./tmp/lofi_audio.wav

    # -------------------------
    # Generate animation
    # -------------------------
    - name: Generate Animation
      shell: bash
      run: |
        echo "🎨 Generating Animation..."
        python ./scripts/generate_animation.py \
          --seed $SEED \
          --output ./tmp/lofi_animation.mp4

    # -------------------------
    # Upload artifacts
    # -------------------------
    - name: Upload Lofi Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: lofi-assets
        path: |
          ./tmp/lofi_audio.wav
          ./tmp/lofi_animation.mp4
