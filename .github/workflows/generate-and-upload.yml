name: Lofi Auto-Generate & Upload (Debug)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      seed:
        description: 'Random seed (kosongkan untuk acak)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # 3. Generate session seed
      - name: Generate session seed
        id: seed
        run: |
          if [ -n "${{ github.event.inputs.seed }}" ]; then
            echo "value=${{ github.event.inputs.seed }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(python3 -c 'import random; print(random.randint(1, 999999))')" >> $GITHUB_OUTPUT

      # 4. Debug: check LOFI API
      - name: Check LOFI API availability
        env:
          LOFI_API_URL: ${{ secrets.LOFI_API_URL }}
        run: |
          echo "🔎 Checking LOFI API..."
          if curl -sSf "$LOFI_API_URL" >/dev/null; then
            echo "✅ LOFI API is reachable"
          else
            echo "⚠️ LOFI API not reachable. Skipping audio generation"
            echo "skip_audio=true" >> $GITHUB_ENV

      # 5. Generate audio via LOFI API (skip jika API down)
      - name: Generate 1-hour lofi audio via API
        if: env.skip_audio != 'true'
        env:
          SEED: ${{ steps.seed.outputs.value }}
          LOFI_API_URL: ${{ secrets.LOFI_API_URL }}
        run: |
          echo "🎵 Generating audio with seed: $SEED"
          python3 scripts/generate_audio.py \
            --seed "$SEED" \
            --duration 3600 \
            --output /tmp/lofi_audio.wav \
            --api-url "${LOFI_API_URL}"

      # 6. Generate animation
      - name: Generate lofi animation
        env:
          SEED: ${{ steps.seed.outputs.value }}
        run: |
          python3 scripts/generate_animation.py \
            --seed "$SEED" \
            --output /tmp/lofi_bg.mp4 \
            --duration 3600

      # 7. Compose final video (skip audio if missing)
      - name: Compose final video
        run: |
          AUDIO_INPUT=""
          if [ -f /tmp/lofi_audio.wav ]; then
            AUDIO_INPUT="-i /tmp/lofi_audio.wav -c:a aac -b:a 192k"
          else
            echo "⚠️ Audio not generated, creating silent video"
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 3600 /tmp/lofi_audio.wav
            AUDIO_INPUT="-i /tmp/lofi_audio.wav -c:a aac -b:a 192k"
          fi

          ffmpeg -y -i /tmp/lofi_bg.mp4 $AUDIO_INPUT \
            -c:v libx264 -preset fast -crf 23 \
            -shortest \
            -movflags +faststart \
            /tmp/lofi_final.mp4
          echo "✅ Video size: $(du -sh /tmp/lofi_final.mp4 | cut -f1)"

      # 8. Generate metadata
      - name: Generate video metadata
        env:
          SEED: ${{ steps.seed.outputs.value }}
        run: |
          python3 scripts/generate_metadata.py \
            --seed "$SEED" \
            --output /tmp/video_metadata.json

      # 9. Upload to YouTube
      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python3 scripts/upload_youtube.py \
            --video /tmp/lofi_final.mp4 \
            --metadata /tmp/video_metadata.json

      # 10. Cleanup
      - name: Cleanup temp files
        if: always()
        run: |
          rm -f /tmp/lofi_audio.wav /tmp/lofi_bg.mp4 /tmp/lofi_final.mp4 /tmp/video_metadata.json
          echo "🧹 Cleanup done"
