name: Generate & Upload Lofi Video

on:
  schedule:
    # 4x sehari: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Durasi video dalam menit (default: 60)'
        required: false
        default: '60'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            pulseaudio-utils \
            libpulse0 \
            libnss3 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            fonts-noto \
            fonts-noto-cjk \
            python3-pip \
            jq

      - name: Install Node.js dependencies
        working-directory: scripts/capture
        run: |
          # Hapus node_modules & package-lock.json lama
          rm -rf node_modules package-lock.json

          # Cek versi terbaru puppeteer-stream yang tersedia
          LATEST=$(npm view puppeteer-stream versions --json | jq -r '.[-1]')
          echo "Latest puppeteer-stream version: $LATEST"

          # Update package.json agar menggunakan versi valid
          if [ -f package.json ]; then
            jq ".dependencies[\"puppeteer-stream\"] = \"^$LATEST\"" package.json > package.tmp.json
            mv package.tmp.json package.json
          fi

          # Install dependencies
          npm install

      - name: Install Python dependencies
        run: |
          pip install Pillow numpy google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Start virtual display (Xvfb)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          echo "[setup] Xvfb started (PID: $XVFB_PID)"

      - name: Start PulseAudio virtual sink
        run: |
          pkill pulseaudio || true
          sleep 1
          pulseaudio --start --exit-idle-time=-1 --disallow-exit -D
          sleep 2
          pactl load-module module-null-sink sink_name=VirtualSink sink_properties=device.description=VirtualSink
          pactl set-default-sink VirtualSink
          echo "PULSE_SINK=VirtualSink" >> $GITHUB_ENV
          echo "PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1001}/pulse/native" >> $GITHUB_ENV
          pactl info
          pactl list sinks short
          echo "[setup] PulseAudio ready"

      - name: Verify audio setup
        run: |
          echo "DISPLAY=$DISPLAY"
          echo "PULSE_SINK=$PULSE_SINK"
          pactl stat || echo "PulseAudio stat gagal"
          pactl list sinks short

      - name: Generate video seed and metadata
        id: metadata
        run: |
          python3 scripts/generate_metadata.py
          source /tmp/lofi_metadata.env
          echo "seed=$SEED" >> $GITHUB_OUTPUT
          echo "theme=$THEME" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "title<<EOF_TITLE" >> $GITHUB_OUTPUT
          echo "$TITLE" >> $GITHUB_OUTPUT
          echo "EOF_TITLE" >> $GITHUB_OUTPUT
          echo "description<<EOF_DESC" >> $GITHUB_OUTPUT
          echo "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "EOF_DESC" >> $GITHUB_OUTPUT

      - name: Capture Lofi audio from browser
        env:
          DISPLAY: ':99'
          PULSE_SINK: VirtualSink
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '60' }}
        run: |
          cd scripts/capture
          node capture.js \
            --duration=$DURATION_MINUTES \
            --output=/tmp/lofi_audio.webm
          FILE_SIZE=$(stat -c%s /tmp/lofi_audio.webm)
          MIN_SIZE=$(( DURATION_MINUTES * 1000000 ))
          if [ "$FILE_SIZE" -lt 100000 ]; then
            echo "ERROR: File audio terlalu kecil ($FILE_SIZE bytes)!"
            exit 1
          fi

      - name: Convert audio to MP3
        run: |
          ffmpeg -i /tmp/lofi_audio.webm -vn -acodec libmp3lame -ab 192k -ar 44100 /tmp/lofi_audio.mp3 2>&1
          AUDIO_INFO=$(ffprobe -v quiet -show_streams -select_streams a /tmp/lofi_audio.mp3 2>&1)
          if [ -z "$AUDIO_INFO" ]; then
            echo "ERROR: File MP3 tidak memiliki audio stream!"
            exit 1
          fi

      - name: Generate animation
        env:
          SEED: ${{ steps.metadata.outputs.seed }}
          THEME: ${{ steps.metadata.outputs.theme }}
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '60' }}
        run: |
          python3 scripts/generate_animation.py \
            --seed=$SEED \
            --theme=$THEME \
            --duration=$DURATION_MINUTES \
            --output=/tmp/lofi_animation.mp4

      - name: Combine audio and animation into final video
        env:
          DURATION_MINUTES: ${{ github.event.inputs.duration_minutes || '60' }}
        run: |
          DURATION_SECS=$(( ${DURATION_MINUTES} * 60 ))
          ffmpeg -y \
            -i /tmp/lofi_animation.mp4 \
            -i /tmp/lofi_audio.mp3 \
            -map 0:v:0 -map 1:a:0 \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 192k \
            -shortest \
            -t $DURATION_SECS \
            /tmp/lofi_final.mp4
          AUDIO_STREAM=$(ffprobe -v quiet -show_streams -select_streams a /tmp/lofi_final.mp4 2>&1)
          if [ -z "$AUDIO_STREAM" ]; then
            echo "ERROR: Video final tidak memiliki audio stream!"
            exit 1
          fi

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VIDEO_TITLE: ${{ steps.metadata.outputs.title }}
          VIDEO_DESCRIPTION: ${{ steps.metadata.outputs.description }}
          VIDEO_TAGS: ${{ steps.metadata.outputs.tags }}
        run: |
          python3 scripts/upload_youtube.py \
            --video=/tmp/lofi_final.mp4 \
            --title="$VIDEO_TITLE" \
            --description="$VIDEO_DESCRIPTION" \
            --tags="$VIDEO_TAGS"

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/lofi_audio.webm /tmp/lofi_audio.mp3 \
                /tmp/lofi_animation.mp4 /tmp/lofi_final.mp4 \
                /tmp/lofi_metadata.env
          pkill Xvfb || true
          pulseaudio --kill || true
