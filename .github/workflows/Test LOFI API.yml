# ── 6a. Test LOFI API ─────────────────────────────────────────────
- name: Test LOFI API access
  env:
    LOFI_API_URL: ${{ secrets.LOFI_API_URL }}
  run: |
    echo "🔍 Testing access to LOFI API: $LOFI_API_URL"
    HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$LOFI_API_URL")
    echo "HTTP status: $HTTP_STATUS"
    if [ "$HTTP_STATUS" -ne 200 ]; then
      echo "❌ Cannot reach LOFI API! Exiting workflow."
      exit 1
    fi
 
